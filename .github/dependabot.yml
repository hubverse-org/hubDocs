# instruct GitHub dependabot to scan pre-commit hooks and Python code for dependency updates
# note: this site is built by Read the Docs (not GitHub Actions), so there are no workflow
# files for the github-actions ecosystem to scan

version: 2
updates:
  - package-ecosystem: "pre-commit"
    directory: "/"
    schedule:
      interval: "weekly"
    # group all run-of-the mill updates into a single pull request
    groups:
      pre-commit-updates:
        applies-to: version-updates
        update-types:
          - patch
          - minor
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-patch"

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    # group all run-of-the mill updates into a single pull request
    groups:
      py-updates:
        applies-to: version-updates
        update-types:
          - patch
          - minor
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-patch"
